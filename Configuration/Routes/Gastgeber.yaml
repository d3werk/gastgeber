# Route-Enhancer für sprechende, reload-sichere Gastgeber-Detail-URLs.
#
# Ziel:
#   /gastgeber/hotel-acht-linden
#
# Wichtig:
# - Die Detail-Links entstehen im Projekt über das Listen-Plugin:
#   tx_gastgeber_list[action]=detail&tx_gastgeber_list[host]=...
# - Deshalb muss der aktive Route-Enhancer auf plugin: List zeigen.
# - Die Route ist bewusst auf genau einen Pfadbestandteil begrenzt: /{host}.
#   Dadurch wird hinter der Seite /gastgeber ausschließlich der Gastgeber-Slug
#   verwendet. Das ist SEO-sauber und reload-sicher.
#
# Einbau in config/sites/<site-identifier>/config.yaml:
#
# imports:
#   - { resource: "EXT:gastgeber/Configuration/Routes/Gastgeber.yaml" }
#
# Falls routeEnhancers dort bereits direkt gepflegt werden, kann der Block
# GastgeberListDetail auch direkt unter routeEnhancers kopiert werden.
#
# Empfehlung:
# limitToPages auf die UID der Seite begrenzen, auf der die Gastgeberliste liegt.
# Beispiel für die Seite /gastgeber:
#
# limitToPages:
#   - 123

routeEnhancers:
  GastgeberListDetail:
    type: Extbase
    extension: Gastgeber
    plugin: List
    # SEO-/Sicherheits-Empfehlung:
    # Bitte die UID der Gastgeber-Listenseite eintragen und entkommentieren.
    # Dadurch greift /{host} nur auf dieser Seite, z. B. /gastgeber/hotel-acht-linden.
    # limitToPages:
    #   - 123
    routes:
      -
        routePath: '/{host}'
        _controller: 'Host::detail'
        _arguments:
          host: host
    defaultController: 'Host::list'
    aspects:
      host:
        type: PersistedAliasMapper
        tableName: tx_gastgeber_domain_model_host
        routeFieldName: slug

  # Nur verwenden, wenn tatsächlich ein eigenes Detail-Plugin mit dem Namespace
  # tx_gastgeber_detail auf einer separaten Detailseite eingesetzt wird.
  # In der aktuellen Undeloh-Konfiguration ist normalerweise GastgeberListDetail
  # der entscheidende aktive Enhancer.
  # GastgeberDetail:
  #   type: Extbase
  #   extension: Gastgeber
  #   plugin: Detail
  #   # limitToPages:
  #   #   - 124
  #   routes:
  #     -
  #       routePath: '/{host}'
  #       _controller: 'Host::detail'
  #       _arguments:
  #         host: host
  #   defaultController: 'Host::detail'
  #   aspects:
  #     host:
  #       type: PersistedAliasMapper
  #       tableName: tx_gastgeber_domain_model_host
  #       routeFieldName: slug
