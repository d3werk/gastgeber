# Route-Enhancer für sprechende, reload-sichere Gastgeber-Detail-URLs.
#
# Ziel:
#   /gastgeber/hotel-acht-linden
#
# GASTGEBER_ROUTE_SLUG_FALLBACK_FINAL_2026_06_09 / GASTGEBER_ROUTE_NO_CHASH_MIDDLEWARE_FINAL_2026_06_09 / GASTGEBER_ROUTE_PRESITE_REWRITE_FINAL_2026_06_09:
# Diese Version enthält zwei Ebenen:
# 1. Slug-Fallback ohne PersistedAliasMapper für eingehende URLs.
#    Dadurch erzeugt ein noch nicht auflösbarer Alias keinen 404 mehr,
#    sondern der Controller bekommt den Slug und löst den Gastgeber selbst auf.
# 2. Host-Route mit PersistedAliasMapper für die SEO-Link-Erzeugung aus
#    Extbase-Links mit host-Argument.
#
# Einbau in config/sites/<site-identifier>/config.yaml:
#
# imports:
#   - { resource: "EXT:gastgeber/Configuration/Routes/Gastgeber.yaml" }
#
# Wichtig:
# - imports: muss in der echten Site-Konfiguration liegen, nicht im Site-Set.
# - Optional kann limitToPages auf die UID der Seite /gastgeber begrenzt werden.
#
# Beispiel:
# limitToPages:
#   - 123

routeEnhancers:
  GastgeberListDetail:
    type: Extbase
    extension: Gastgeber
    plugin: List
    # Empfehlung: UID der Seite /gastgeber eintragen und entkommentieren.
    # limitToPages:
    #   - 123
    routes:
      # Fallback für eingehende SEO-URLs wie /gastgeber/hotel-acht-linden.
      # Bewusst OHNE aspect, damit TYPO3 nicht schon im Routing mit 404 abbricht,
      # falls der PersistedAliasMapper den Datensatz nicht direkt auflösen kann.
      -
        routePath: '/{slug}'
        _controller: 'Host::detail'
        _arguments:
          slug: slug
      # Primäre Route für Extbase-Link-Erzeugung aus host-Argumenten.
      -
        routePath: '/{host}'
        _controller: 'Host::detail'
        _arguments:
          host: host
    defaultController: 'Host::list'
    requirements:
      slug: '^[a-z0-9][a-z0-9\-_]*$'
      host: '^[a-z0-9][a-z0-9\-_]*$'
    aspects:
      host:
        type: PersistedAliasMapper
        tableName: tx_gastgeber_domain_model_host
        routeFieldName: slug

  GastgeberDetail:
    type: Extbase
    extension: Gastgeber
    plugin: Detail
    # Empfehlung: UID der Detailseite eintragen, falls das Detail-Plugin
    # auf einer eigenen Seite verwendet wird.
    # limitToPages:
    #   - 124
    routes:
      # Fallback für eingehende SEO-URLs.
      -
        routePath: '/{slug}'
        _controller: 'Host::detail'
        _arguments:
          slug: slug
      # Primäre Route für Extbase-Link-Erzeugung.
      -
        routePath: '/{host}'
        _controller: 'Host::detail'
        _arguments:
          host: host
    defaultController: 'Host::detail'
    requirements:
      slug: '^[a-z0-9][a-z0-9\-_]*$'
      host: '^[a-z0-9][a-z0-9\-_]*$'
    aspects:
      host:
        type: PersistedAliasMapper
        tableName: tx_gastgeber_domain_model_host
        routeFieldName: slug
