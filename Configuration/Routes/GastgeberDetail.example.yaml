# Beispiel für config/sites/<site>/config.yaml
#
# Nur verwenden, wenn die Detailseite ein eigenes Plugin
# "Gastgeber: Detailansicht" enthält und die erzeugte URL tx_gastgeber_detail
# enthält. Wenn die URL tx_gastgeber_list enthält, muss stattdessen
# GastgeberListSamePage.example.yaml verwendet werden.
#
# Ziel:
#   /gastgeber/hotel-acht-linden

routeEnhancers:
  GastgeberDetail:
    type: Extbase
    extension: Gastgeber
    plugin: Detail
    # Optional: UID der Seite mit dem Detail-Plugin.
    # limitToPages:
    #   - 514
    routes:
      -
        routePath: '/{host}'
        _controller: 'Host::detail'
        _arguments:
          host: host
    defaultController: 'Host::detail'
    aspects:
      host:
        type: PersistedAliasMapper
        tableName: tx_gastgeber_domain_model_host
        routeFieldName: slug
