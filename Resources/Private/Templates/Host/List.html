<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:gh="http://typo3.org/ns/D3Werk/Gastgeber/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="Main">
<div class="gastgeber-directory" data-gastgeber-directory data-gastgeber-view-mode="{viewMode}">
  <f:render partial="List/Header" arguments="{_all}" />

  <f:if condition="{settings.showFilter}">
    <f:then>
      <button class="btn btn-primary gastgeber-mobile-filter-toggle d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#gastgeber-filter-panel" aria-expanded="false" aria-controls="gastgeber-filter-panel">
        <span aria-hidden="true">☰</span>
        <span>Filter anzeigen / ausblenden</span>
      </button>
      <div class="gastgeber-layout">
        <div id="gastgeber-filter-panel" class="gastgeber-layout__filter collapse d-lg-block">
          <f:render partial="Filter/Sidebar" arguments="{_all}" />
        </div>
        <div class="gastgeber-layout__results">
          <f:render partial="List/Results" arguments="{_all}" />
        </div>
      </div>
    </f:then>
    <f:else>
      <f:render partial="List/Results" arguments="{_all}" />
    </f:else>
  </f:if>

  <f:if condition="{settings.showMap}">
    <f:render partial="Map/Modal" arguments="{_all}" />
  </f:if>
</div>
</f:section>
</html>
