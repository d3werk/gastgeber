<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="General" />

<f:section name="content">
    <!--
        Optional standalone template for a later dedicated map action/plugin.
        In the current EXT:news integration, the active entry point is Templates/News/List.html,
        because EXT:news renders the list action through News/List.html.
    -->
    <f:if condition="{news}">
        <f:then>
            <f:if condition="{settings.hidePagination}">
                <f:then>
                    <f:render partial="Map/View" arguments="{items: news, settings: settings}" />
                </f:then>
                <f:else>
                    <f:render partial="Map/View" arguments="{items: pagination.paginator.paginatedItems, settings: settings}" />
                </f:else>
            </f:if>
        </f:then>
        <f:else>
            <div class="alert alert-info gastgeber-empty" role="status">
                <f:translate key="LLL:EXT:gastgeber/Resources/Private/Language/locallang.xlf:noHostsFound" />
            </div>
        </f:else>
    </f:if>
</f:section>
</html>
