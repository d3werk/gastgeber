<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="gastgeber-map-layout row g-4">
    <div class="col-12 col-xl-8">
        <f:render partial="Map/Container" arguments="{items: items, settings: settings, defaultLatitude: settings.gastgeber.map.defaultLatitude, defaultLongitude: settings.gastgeber.map.defaultLongitude, defaultZoom: settings.gastgeber.map.defaultZoom, ariaLabel: 'Karte der Gastgeber'}" />
    </div>
    <div class="col-12 col-xl-4">
        <f:render partial="Map/List" arguments="{items: items, settings: settings}" />
    </div>
</div>
</html>
