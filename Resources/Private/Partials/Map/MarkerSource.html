<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="gastgeber-map__marker-source d-none" aria-hidden="true">
    <f:for each="{items}" as="newsItem">
        <f:if condition="{newsItem.txGastgeberShowOnMap}">
            <f:if condition="{newsItem.txGastgeberLatitude}">
                <f:if condition="{newsItem.txGastgeberLongitude}">
                    <div class="js-gastgeber-map-marker"
                         data-lat="{newsItem.txGastgeberLatitude}"
                         data-lng="{newsItem.txGastgeberLongitude}"
                         data-title="{newsItem.title}">
                        <f:render partial="Map/Popup" arguments="{newsItem: newsItem, settings: settings}" />
                    </div>
                </f:if>
            </f:if>
        </f:if>
    </f:for>
</div>
</html>
