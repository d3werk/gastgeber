<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="gastgeber-map card js-gastgeber-map"
     data-default-lat="{defaultLatitude}"
     data-default-lng="{defaultLongitude}"
     data-default-zoom="{defaultZoom}"
     data-tile-url="{settings.gastgeber.map.tileUrl}"
     data-attribution="{settings.gastgeber.map.attribution}">
    <div class="card-body p-0">
        <div class="gastgeber-map__canvas js-gastgeber-map-canvas" role="region" aria-label="{ariaLabel}"></div>
    </div>
    <f:render partial="Map/MarkerSource" arguments="{items: items, settings: settings}" />
</div>
</html>
