<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:g="http://typo3.org/ns/D3Werk/Gastgeber/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="gastgeber-map-view">
    <div class="gastgeber-map" data-gastgeber-map="1" data-zoom="{settings.map.zoom}" data-lat="{settings.map.defaultLatitude}" data-lng="{settings.map.defaultLongitude}" data-tile-url="{settings.map.tileUrl}" data-attribution="{settings.map.attribution}"></div>
    <script type="application/json" class="gastgeber-map-markers">{g:mapMarkers(hosts: hosts)}</script>
</div>
</html>
