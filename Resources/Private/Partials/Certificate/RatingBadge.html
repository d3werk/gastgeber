<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{certificate}">
  <span class="gastgeber-rating-badge" aria-label="Klassifizierung: {certificate.title}">
    <span class="gastgeber-rating-badge__stars" aria-hidden="true">{certificate.starLabel}</span>
    <span class="gastgeber-rating-badge__label">{certificate.title}</span>
  </span>
</f:if>
</html>
