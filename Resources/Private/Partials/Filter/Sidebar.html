<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:gh="http://typo3.org/ns/D3Werk/Gastgeber/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="activeFilterCount" value="{gh:activeFilterCount(filters: filters)}" />
<aside class="gastgeber-filter-sidebar" aria-label="Gastgeber filtern">
  <div class="gastgeber-filter-sidebar__head">
    <div>
      <p class="gastgeber-eyebrow mb-1">Suche</p>
      <h3>Filter</h3>
    </div>
    <f:if condition="{activeFilterCount}">
      <span class="gastgeber-filter-count">{activeFilterCount}</span>
    </f:if>
  </div>

  <f:form action="list" method="get" class="gastgeber-filter-search">
    <f:form.hidden name="view" value="{viewMode}" />
    <f:for each="{filters.types}" as="uid"><f:form.hidden name="types[]" value="{uid}" /></f:for>
    <f:for each="{filters.features}" as="uid"><f:form.hidden name="features[]" value="{uid}" /></f:for>
    <f:for each="{filters.districts}" as="uid"><f:form.hidden name="districts[]" value="{uid}" /></f:for>
    <label for="gastgeber-filter-search-input">Unterkunft suchen</label>
    <div class="gastgeber-filter-search__row">
      <f:form.textfield id="gastgeber-filter-search-input" type="search" name="search" value="{filters.search}" placeholder="Name, Ort, Ausstattung ..." />
      <button class="btn btn-primary" type="submit">Suchen</button>
    </div>
  </f:form>

  <f:if condition="{activeFilterCount}">
    <div class="gastgeber-activefilters">
      <span>Aktive Filter</span>
      <f:link.action action="list" arguments="{view: viewMode}" class="gastgeber-activefilters__reset">Alle zurücksetzen</f:link.action>
    </div>
  </f:if>

  <section class="gastgeber-filter-group gastgeber-filter-group--types">
    <h4>Art der Unterkunft</h4>
    <nav class="gastgeber-filter-links" aria-label="Art der Unterkunft">
      <f:for each="{types}" as="type">
        <f:if condition="{type.showInFilter}">
          <f:variable name="toggleArgs" value="{gh:toggleFilterArguments(filters: filters, field:'types', value:type.uid, view:viewMode)}" />
          <f:variable name="typeActive" value="{gh:inArray(needle: type.uid, haystack: filters.types)}" />
          <f:link.action action="list" arguments="{toggleArgs}" class="gastgeber-filter-link {f:if(condition: typeActive, then: 'is-active')}">
            <span class="gastgeber-filter-link__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: type}" /></span>
            <span>{type.title}</span>
          </f:link.action>
        </f:if>
      </f:for>
    </nav>
  </section>

  <f:if condition="{districts}">
    <section class="gastgeber-filter-group">
      <h4>Ortsteil</h4>
      <nav class="gastgeber-filter-links" aria-label="Ortsteil">
        <f:for each="{districts}" as="district">
          <f:variable name="toggleArgs" value="{gh:toggleFilterArguments(filters: filters, field:'districts', value:district.uid, view:viewMode)}" />
          <f:variable name="districtActive" value="{gh:inArray(needle: district.uid, haystack: filters.districts)}" />
          <f:link.action action="list" arguments="{toggleArgs}" class="gastgeber-filter-link {f:if(condition: districtActive, then: 'is-active')}">
            <span>{district.title}</span>
          </f:link.action>
        </f:for>
      </nav>
    </section>
  </f:if>

  <section class="gastgeber-filter-group gastgeber-filter-group--features">
    <h4>Ausstattung</h4>
    <!-- GASTGEBER_LIST_FILTER_FEATURES_FINAL_2026_06_09:
         Die Merkmale werden bereits im Controller gruppiert. Dadurch werden alle
         Merkmale einer Gruppe zuverlässig angezeigt und nicht mehr durch Fluid-
         Objektvergleiche oder einzelne Filterable-Flags versehentlich ausgeblendet. -->
    <f:for each="{filterFeatureGroups}" as="group">
      <div class="gastgeber-filter-subgroup">
        <h5>
          <span class="gastgeber-filter-subgroup__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: group}" /></span>
          <span>{group.title}</span>
        </h5>
        <nav class="gastgeber-filter-links" aria-label="{group.title}">
          <f:for each="{group.features}" as="feature">
            <f:variable name="toggleArgs" value="{gh:toggleFilterArguments(filters: filters, field:'features', value:feature.uid, view:viewMode)}" />
            <f:variable name="featureActive" value="{gh:inArray(needle: feature.uid, haystack: filters.features)}" />
            <f:link.action action="list" arguments="{toggleArgs}" class="gastgeber-filter-link {f:if(condition: featureActive, then: 'is-active')}">
              <span class="gastgeber-filter-link__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: feature}" /></span>
              <span>{feature.title}</span>
            </f:link.action>
          </f:for>
        </nav>
      </div>
    </f:for>
  </section>
</aside>
</html>
