<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:g="http://typo3.org/ns/D3Werk/Gastgeber/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="categoryGroups" value="{g:categoryGroup(categories: newsItem.categories, fallback: newsItem.firstCategory)}" />
<header class="gastgeber-detail-hero mb-5">
    <div class="gastgeber-detail-hero__intro p-4 p-lg-5 border bg-body-tertiary mb-4">
        <div class="gastgeber-detail-hero__meta d-flex flex-wrap gap-2 mb-3">
            <f:if condition="{categoryGroups.primaryCategory}">
                <f:render partial="Category/Badge" arguments="{category: categoryGroups.primaryCategory}" />
            </f:if>
            <f:for each="{categoryGroups.starCategories}" as="category">
                <f:render partial="Category/Badge" arguments="{category: category}" />
            </f:for>
        </div>

        <h1 class="gastgeber-detail__title display-6 mb-3" itemprop="name">{newsItem.title}</h1>

        <f:if condition="{newsItem.txGastgeberStreet} || {newsItem.txGastgeberCity}">
            <p class="gastgeber-detail-hero__location mb-0" itemprop="address" itemscope="itemscope" itemtype="https://schema.org/PostalAddress">
                <span class="gastgeber-detail-hero__location-icon" aria-hidden="true">📍</span>
                <f:if condition="{newsItem.txGastgeberStreet}"><span itemprop="streetAddress">{newsItem.txGastgeberStreet}</span><f:if condition="{newsItem.txGastgeberCity}">, </f:if></f:if>
                <f:if condition="{newsItem.txGastgeberZip} || {newsItem.txGastgeberCity}"><span itemprop="postalCode">{newsItem.txGastgeberZip}</span> <span itemprop="addressLocality">{newsItem.txGastgeberCity}</span></f:if>
            </p>
        </f:if>
    </div>

    <div class="gastgeber-detail-hero__media">
        <f:render partial="Detail/MediaHero" arguments="{newsItem: newsItem}" />
    </div>
</header>
</html>
