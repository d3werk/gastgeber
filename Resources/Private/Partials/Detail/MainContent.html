<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="gastgeber-detail-main d-grid gap-4">
    <f:if condition="{newsItem.bodytext}">
        <section class="gastgeber-detail__section card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h2 class="h3 mb-3"><f:translate key="LLL:EXT:gastgeber/Resources/Private/Language/locallang.xlf:aboutHost" /></h2>
                <div class="gastgeber-detail__body news-text-wrap" itemprop="description">
                    <f:format.html>{newsItem.bodytext}</f:format.html>
                </div>
            </div>
        </section>
    </f:if>

    <f:if condition="{newsItem.categories}">
        <section class="gastgeber-detail__section card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h2 class="h3 mb-3"><f:translate key="LLL:EXT:gastgeber/Resources/Private/Language/locallang.xlf:features" /></h2>
                <div class="gastgeber-feature-grid">
                    <f:render partial="Category/Items" arguments="{categories: newsItem.categories, settings: settings}" />
                </div>
            </div>
        </section>
    </f:if>

    <f:if condition="{newsItem.txGastgeberEquipment}">
        <section class="gastgeber-detail__section card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h2 class="h3 mb-3"><f:translate key="LLL:EXT:gastgeber/Resources/Private/Language/locallang.xlf:equipment" /></h2>
                <f:format.html>{newsItem.txGastgeberEquipment}</f:format.html>
            </div>
        </section>
    </f:if>

    <f:if condition="{newsItem.txGastgeberCertifications}">
        <section class="gastgeber-detail__section card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h2 class="h3 mb-3"><f:translate key="LLL:EXT:gastgeber/Resources/Private/Language/locallang.xlf:certifications" /></h2>
                <f:format.html>{newsItem.txGastgeberCertifications}</f:format.html>
            </div>
        </section>
    </f:if>

    <f:if condition="{newsItem.contentElements}">
        <section class="gastgeber-detail__content-elements">
            <f:cObject typoscriptObjectPath="lib.tx_news.contentElementRendering">{newsItem.contentElementIdList}</f:cObject>
        </section>
    </f:if>
</div>
</html>
