<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<section class="gastgeber-contact-card">
  <h3>Anfragen / Buchen</h3>
  <f:if condition="{host.bookingText}"><f:format.html>{host.bookingText}</f:format.html></f:if>
  <div class="gastgeber-contact-card__actions">
    <f:if condition="{host.bookingUrl}"><f:link.typolink parameter="{host.bookingUrl}" class="btn btn-primary w-100">Jetzt buchen / anfragen</f:link.typolink></f:if>
    <f:if condition="{host.website}"><f:link.typolink parameter="{host.website}" class="btn btn-outline-primary w-100">Webseite öffnen</f:link.typolink></f:if>
    <f:if condition="{host.email}"><a href="mailto:{host.email}" class="btn btn-outline-primary w-100">E-Mail schreiben</a></f:if>
    <f:if condition="{host.phone}"><a href="tel:{host.phone}" class="btn btn-outline-primary w-100">{host.phone}</a></f:if>
  </div>
  <f:if condition="{host.addressLine}"><address>{host.addressLine}</address></f:if>
</section>
</html>
