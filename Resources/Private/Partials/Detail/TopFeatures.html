<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.topFeatures}">
  <section class="gastgeber-topfeatures" aria-label="Top-Merkmale">
    <f:for each="{host.topFeatures}" as="feature">
      <div class="gastgeber-topfeatures__item">
        <span class="gastgeber-topfeatures__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: feature}" /></span>
        <span class="gastgeber-topfeatures__label">{feature.title}</span>
      </div>
    </f:for>
  </section>
</f:if>
</html>
