<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.topFeatures}">
  <ul class="gastgeber-topfeatures">
    <f:for each="{host.topFeatures}" as="feature">
      <li><f:render partial="Category/Icon" arguments="{item:feature}" /> <strong>{feature.title}</strong></li>
    </f:for>
  </ul>
</f:if>
</html>
