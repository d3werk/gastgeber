<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.detailFeatureCount} || {host.equipmentText}">
  <section class="gastgeber-section gastgeber-section--features">
    <div class="gastgeber-section__header">
      <div>
        <p class="gastgeber-eyebrow mb-1">Ausstattung</p>
        <h3>Merkmale &amp; Ausstattung auf einen Blick</h3>
      </div>
      <f:if condition="{host.detailFeatureCount} &gt; 6">
        <button type="button" class="btn btn-outline-primary gastgeber-feature-more" data-bs-toggle="modal" data-bs-target="#gastgeber-features-{host.uid}">
          <span class="gastgeber-feature-more__icon" aria-hidden="true">▦</span>
          <span>Alle {host.detailFeatureCount} Ausstattungsmerkmale anzeigen</span>
        </button>
      </f:if>
    </div>

    <f:if condition="{host.detailPreviewFeatures}">
      <ul class="gastgeber-feature-grid gastgeber-feature-grid--preview">
        <f:for each="{host.detailPreviewFeatures}" as="feature">
          <li>
            <span class="gastgeber-feature-grid__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: feature}" /></span>
            <span class="gastgeber-feature-grid__label">{feature.title}</span>
          </li>
        </f:for>
      </ul>
    </f:if>

    <f:if condition="{host.equipmentText}">
      <div class="gastgeber-equipment-text mt-4">
        <h4>Ausstattung im Detail</h4>
        <f:format.html>{host.equipmentText}</f:format.html>
      </div>
    </f:if>
  </section>
</f:if>
</html>
