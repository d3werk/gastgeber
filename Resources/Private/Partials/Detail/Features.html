<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<section class="gastgeber-section">
  <h3>Das bietet Ihnen die Unterkunft</h3>
  <ul class="gastgeber-feature-grid">
    <f:for each="{host.detailPreviewFeatures}" as="feature">
      <li><f:render partial="Category/Icon" arguments="{item:feature}" /> <span>{feature.title}</span></li>
    </f:for>
  </ul>
  <f:if condition="{host.detailFeatureCount} &gt; 6">
    <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#gastgeber-features-{host.uid}">☰ Alle Ausstattungsmerkmale anzeigen</button>
  </f:if>
</section>
</html>
