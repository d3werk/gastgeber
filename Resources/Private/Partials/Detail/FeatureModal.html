<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.detailFeatureCount} &gt; 6">
  <div class="modal fade gastgeber-modal gastgeber-feature-modal" id="gastgeber-features-{host.uid}" tabindex="-1" aria-labelledby="gastgeber-features-title-{host.uid}" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h4" id="gastgeber-features-title-{host.uid}">Alle Ausstattungsmerkmale</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
        </div>
        <div class="modal-body">
          <f:for each="{host.groupedDetailFeatures}" as="featureGroup">
            <section class="gastgeber-feature-modal__group">
              <h3 class="h5">
                <f:if condition="{featureGroup.iconClass}"><span class="{featureGroup.iconClass}" aria-hidden="true"></span></f:if>
                {featureGroup.title}
              </h3>
              <ul class="gastgeber-feature-grid gastgeber-feature-grid--modal">
                <f:for each="{featureGroup.features}" as="feature">
                  <li>
                    <span class="gastgeber-feature-grid__icon" aria-hidden="true"><f:render partial="Category/Icon" arguments="{item: feature}" /></span>
                    <span class="gastgeber-feature-grid__label">{feature.title}</span>
                    <f:if condition="{feature.description}"><span class="gastgeber-feature-grid__description">{feature.description -> f:format.stripTags()}</span></f:if>
                  </li>
                </f:for>
              </ul>
            </section>
          </f:for>
        </div>
      </div>
    </div>
  </div>
</f:if>
</html>
