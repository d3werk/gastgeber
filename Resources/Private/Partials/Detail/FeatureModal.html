<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.remainingFeatureCount} &gt; 0">
  <div class="modal fade gastgeber-modal gastgeber-feature-modal" id="gastgeber-features-{host.uid}" tabindex="-1" aria-labelledby="gastgeber-features-title-{host.uid}" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable modal-dialog-centered modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h4" id="gastgeber-features-title-{host.uid}">Weitere Ausstattungsmerkmale</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
        </div>
        <div class="modal-body">
          <f:for each="{host.groupedRemainingDetailFeatures}" as="featureGroup">
            <section class="gastgeber-feature-modal__group">
              <h3 class="h5">
                <f:if condition="{featureGroup.iconClass}"><span class="{featureGroup.iconClass}" aria-hidden="true"></span></f:if>
                {featureGroup.title}
              </h3>
              <ul class="gastgeber-feature-grid gastgeber-feature-grid--modal">
                <f:for each="{featureGroup.features}" as="feature">
                  <f:render partial="Feature/Item" arguments="{feature: feature, showDescription: 1}" />
                </f:for>
              </ul>
            </section>
          </f:for>
        </div>
      </div>
    </div>
  </div>
</f:if>
</html>
