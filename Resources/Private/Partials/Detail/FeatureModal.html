<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:g="http://typo3.org/ns/D3Werk/Gastgeber/ViewHelpers" data-namespace-typo3-fluid="true">
<f:variable name="features" value="{g:categoryGroup(categories: host.categories, mode: 'features')}" />
<div class="modal fade gastgeber-modal" id="gastgeberFeatureModal-{host.uid}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Alle Ausstattungsmerkmale</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
            </div>
            <div class="modal-body">
                <ul class="gastgeber-feature-grid gastgeber-feature-grid--modal">
                    <f:for each="{features}" as="item">
                        <li><f:render partial="Category/Icon" arguments="{presentation: item.presentation}" /><span>{item.presentation.title}</span></li>
                    </f:for>
                </ul>
            </div>
        </div>
    </div>
</div>
</html>
