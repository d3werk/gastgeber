<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="modal fade" id="gastgeber-features-{host.uid}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Alle Ausstattungsmerkmale</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button></div>
      <div class="modal-body">
        <ul class="gastgeber-feature-grid Gastgeber-feature-grid--modal">
          <f:for each="{host.features}" as="feature">
            <f:if condition="{feature.showInDetail}"><li><f:render partial="Category/Icon" arguments="{item:feature}" /> <span>{feature.title}</span></li></f:if>
          </f:for>
        </ul>
      </div>
    </div>
  </div>
</div>
</html>
