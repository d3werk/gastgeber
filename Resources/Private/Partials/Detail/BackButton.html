<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{settings.listPid}">
  <f:then>
    <a href="{f:uri.page(pageUid: settings.listPid)}"
       class="btn btn-outline-primary gastgeber-detail__back-button"
       data-gastgeber-back-button="1">
      ← Zurück zur Liste
    </a>
  </f:then>
  <f:else>
    <button type="button"
            class="btn btn-outline-primary gastgeber-detail__back-button"
            data-gastgeber-back-button="1">
      ← Zurück zur Liste
    </button>
  </f:else>
</f:if>
</html>
