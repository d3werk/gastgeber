<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="modal fade gastgeber-modal" id="gastgeberGalleryModal-{host.uid}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Alle Bilder</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
            </div>
            <div class="modal-body">
                <div class="gastgeber-gallery-modal-grid">
                    <f:for each="{host.media}" as="image">
                        <figure><f:image image="{image}" width="1000" alt="{host.title}" /><f:if condition="{image.title}"><figcaption>{image.title}</figcaption></f:if></figure>
                    </f:for>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
