<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{presentation.iconUrl}">
    <f:then><img class="gastgeber-icon-img" src="{presentation.iconUrl}" alt="" loading="lazy" /></f:then>
    <f:else>
        <f:if condition="{presentation.iconClass}">
            <i class="gastgeber-icon {presentation.iconClass}" aria-hidden="true"></i>
        </f:if>
    </f:else>
</f:if>
</html>
