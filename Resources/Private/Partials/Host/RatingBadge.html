<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{host.hasStarRating}">
  <span class="gastgeber-rating-badge" aria-label="Klassifizierung: {host.starRatingTitle}">
    <span class="gastgeber-rating-badge__stars" aria-hidden="true">{host.starLabel}</span>
    <span class="gastgeber-rating-badge__label">{host.starRatingTitle}</span>
  </span>
</f:if>
</html>
